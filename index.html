<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links</title>

<style>

body{
margin:0;
padding:40px 20px;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
font-family:sans-serif;
color:white;
}

/* section title */
.section-title{
margin-top:40px;
margin-bottom:15px;
font-size:22px;
letter-spacing:2px;
}

/* links container */
.links{
display:flex;
flex-direction:column;
gap:15px;
max-width:500px;
}

/* buttons */
.links a{
text-decoration:none;
color:white;
padding:18px;
font-size:18px;
border-radius:8px;
text-align:center;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.2);

transition:0.3s;
}

/* hover animation */
.links a:hover{
transform:scale(1.04);
background:rgba(255,255,255,0.25);
}

/* text animation */
.links a span{
display:inline-block;
animation:floatText 3s ease-in-out infinite;
}

@keyframes floatText{
0%{transform:translateY(0);}
50%{transform:translateY(-4px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<!-- PC SECTION -->

<div class="section-title">PC</div>

<div class="links">

<a href="#"><span>Minecraft Mods</span></a>

<a href="#"><span>PC Games</span></a>

<a href="#"><span>Software Tools</span></a>

</div>


<!-- MOBILE SECTION -->

<div class="section-title">Mobile</div>

<div class="links">

<a href="#"><span>Mobile Games</span></a>

<a href="#"><span>Android Mods</span></a>

<a href="#"><span>APK Downloads</span></a>

</div>

</body>
</html>
